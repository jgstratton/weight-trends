services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: weighttrends
      POSTGRES_PASSWORD: weighttrends
      POSTGRES_DB: weighttrends
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weighttrends"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://weighttrends:weighttrends@postgres:5432/weighttrends
      # Email delivery via Resend (https://resend.com)
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pg_data:
